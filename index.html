<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill1</title>
</head>
<body>
    
    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; height: 200px; text-align: center; flex-wrap: wrap;">
        <h2 style="width: 100%;">Check your wattage usage</h2>
            <input type="number" id="kWh" placeholder="Enter kWh" style="padding: 5px;">
            <button class="btn btn-info" onclick="checkkWh()">Check Usage Level</button>
    </div>

    <script>
        function checkkWh() {
            var kWh = document.getElementById("kWh").value;
            
            var A = "Lifeline Consumer";
            var B = "Low Consumption";
            var C = "Average Consumption";
            var D = "High Consumption";
            var E = "Very High Consumption";

            if (kWh === "" || isNaN(kWh) || kWh < 0) {
                alert("Please assign a valid number.");
            }
            else if (kWh <= 100) {
                alert(A + ": Discounted Electricity Rate.");
            }
            else if (kWh <= 200) {
                alert(B + ": Normal Residential Rate.");
            }
            else if (kWh <= 300) {
                alert(C + ": Typical Electricity Usage.");
            }
            else if (kWh <= 500) {
                alert(D + ": Higher Electricity Usage.");
            }
            else {
                alert(E + ": Heavy Electricity Usage.");
            }
        }
    </script>
</body>
</html>
