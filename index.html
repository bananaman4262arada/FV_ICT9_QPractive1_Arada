<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice1</title>
</head>
<body>
    <h1>JavaScript Conditional Statements</h1>

    <h2>Check Age classification</h2>
    <br>
    <button class="btn btn-info" onclick="checkAge()">Check Age</button>

    <script>
        function checkAge(){
            var age = 18;
            if(isNan(age) || age < 0){
                alert("Please assign a valid number.");
            }
            else if(age <18){
                alert("Can you leave? You're too young.");
            }
            else if(age>=18){
                alert("You're allowed to be on this website.");
            }
            else{
                alert("What kinda age is that???");
            }

        }
    </script>
</body>
</html>
